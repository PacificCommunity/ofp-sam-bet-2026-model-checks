name: ofp-sam-bet-2026-model-checks
description: Build portable report-ready BET 2026 Jitter and Retrospective outputs from selected model jobs.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.5@sha256:c87f1f6d9d4f62dc447844b58afe35f96af175bf933cb6cffbbbe39a59172360

resources:
  cpus: 2
  memory: 6GB
  disk: 12GB

env:
  MODEL_JOBS: "8146,8096"
  MODEL_CHECKS: jitter
  MODEL_CHECK_TITLE: BET 2026 jitter model checks
  MODEL_CHECK_OUTPUT_DIR: jitter
  JITTER_GRAD_REFERENCE: "0.001"
  JITTER_REL_DIFF_THRESHOLD: "10"
  JITTER_REPORT_DPI: "300"
  MODEL_CHECK_GRAD_REFERENCE: "0.001"
  MODEL_CHECK_REPORT_DPI: "300"
  MFCLSHINY_GITHUB_REF: 31a501ddd4c82e7fbdb797b3a3c4353a1f3a9ebe
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: auto
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"

output_patterns:
  - jitter/**
  - retrospective/**

triggers: {}

job_config:
  optional:
    - MODEL_JOBS
    - MODEL_CHECKS
    - MODEL_CHECK_TITLE
    - MODEL_CHECK_OUTPUT_DIR
    - JITTER_GRAD_REFERENCE
    - JITTER_REL_DIFF_THRESHOLD
    - JITTER_REPORT_DPI
    - MODEL_CHECK_GRAD_REFERENCE
    - MODEL_CHECK_REPORT_DPI
    - MFCLSHINY_GITHUB_REF
